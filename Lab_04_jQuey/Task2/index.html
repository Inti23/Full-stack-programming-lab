<!DOCTYPE html>
<html>
<head>
    <title>Animated Image Gallery</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f2f2f2;
            margin-top: 50px;
        }

        .gallery {
            width: 500px;
            margin: auto;
        }

        img {
            width: 100%;
            height: 300px;
            border-radius: 10px;
            display: none;
        }

        .caption {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        button {
            padding: 8px 15px;
            margin: 15px 10px;
            cursor: pointer;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

<h2>Animated Image Gallery</h2>

<div class="gallery">
    <img id="galleryImage" src="">
    <div class="caption" id="caption"></div>
</div>

<button id="prev">Previous</button>
<button id="next">Next</button>

<script>
$(document).ready(function () {

    const images = [
        { src: "https://picsum.photos/id/1015/600/400", caption: "Beautiful Mountain" },
        { src: "https://picsum.photos/id/1016/600/400", caption: "Forest Road" },
        { src: "https://picsum.photos/id/1025/600/400", caption: "Cute Puppy" }
    ];

    let index = 0;

    function showImage(i) {
        $("#galleryImage").fadeOut(400, function () {
            $(this)
                .attr("src", images[i].src)
                .fadeIn(400);
        });

        $("#caption").fadeOut(200, function () {
            $(this)
                .text(images[i].caption)
                .fadeIn(200);
        });
    }

    // Load first image
    $("#galleryImage")
        .attr("src", images[index].src)
        .fadeIn(400);

    $("#caption").text(images[index].caption);

    // Next button
    $("#next").click(function () {
        index = (index + 1) % images.length;
        showImage(index);
    });

    // Previous button
    $("#prev").click(function () {
        index = (index - 1 + images.length) % images.length;
        showImage(index);
    });

});
</script>

</body>
</html>
