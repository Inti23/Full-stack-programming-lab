<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Account - HotSpring Portable Spas</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="header-container"></div>
<div class="page-wrapper">
  <div class="container">
    <div class="breadcrumb"><a href="index.html">Home</a> <span>›</span> <a href="#">User Account</a> <span>›</span> Edit profile details</div>
    <h1 class="page-heading">Edit Profile details</h1>
    <div class="page-content">
      <p style="font-size:13px;color:#777;margin-bottom:5px">Please fill the form below to update your Profile details.</p>
      <p style="font-size:12px;color:#c0392b;margin-bottom:20px">*Required Fields</p>
      <form id="editAccountForm" novalidate>
        <div class="form-group"><label>First Name <span class="req">*</span></label><input type="text" id="eaFirst" value="Farrukh"><div class="form-error">First name is required.</div></div>
        <div class="form-group"><label>Last Name <span class="req">*</span></label><input type="text" id="eaLast" value="Javaid"><div class="form-error">Last name is required.</div></div>
        <div class="form-group"><label>Email <span class="req">*</span></label><input type="email" id="eaEmail" value="email@hotubdirect.com"><div class="form-error">Valid email required.</div></div>
        <div class="form-group"><label>Current Password <span class="req">*</span></label><input type="password" id="eaCurPass"><div class="form-error">Current password is required.</div></div>
        <div class="form-group"><label>New Password</label><input type="password" id="eaNewPass"></div>
        <div class="form-group"><label>Confirm Password</label><input type="password" id="eaConfPass"></div>
        <div style="margin-left:160px;margin-top:10px">
          <button type="submit" class="btn btn-success" onclick="handleEditAccount(event)">UPDATE DETAILS</button>
          <a href="my-account.html" style="margin-left:15px;font-size:13px;color:#777">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
<div id="partners-container"></div>
<div id="footer-container"></div>
<script src="js/components.js"></script>
<script>
document.getElementById('header-container').innerHTML = getHeader('');
document.getElementById('partners-container').innerHTML = getPartnerLogos();
document.getElementById('footer-container').innerHTML = getFooter();
function handleEditAccount(e) {
  e.preventDefault();
  let valid = true;
  if (!validateField(document.getElementById('eaFirst'))) valid = false;
  if (!validateField(document.getElementById('eaLast'))) valid = false;
  if (!validateEmail(document.getElementById('eaEmail'))) valid = false;
  if (!validateField(document.getElementById('eaCurPass'))) valid = false;
  const np = document.getElementById('eaNewPass').value;
  const cp = document.getElementById('eaConfPass').value;
  if (np && np !== cp) { showToast('New passwords do not match.', 'error'); valid = false; }
  if (valid) { showToast('Profile updated successfully!', 'success'); setTimeout(() => window.location = 'my-account.html', 1200); }
}
</script>
</body>
</html>
